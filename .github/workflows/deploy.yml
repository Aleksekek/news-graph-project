name: Deploy to VPS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # === JOB 1: Тестирование ===
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock
      
      - name: Run tests
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          pytest tests/unit/ tests/integration/test_parsers_real.py -v --cov=src --cov-report=xml --cov-report=term
      
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # === JOB 2: Линтинг ===
  lint:
    name: 🔍 Lint Check
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install linters
        run: |
          pip install ruff black isort
      
      - name: Run ruff
        run: ruff check src/ --output-format=github || true
      
      - name: Run black check
        run: black --check src/ || true
      
      - name: Run isort check
        run: isort --check-only --profile black src/ || true

  # === JOB 3: Сборка и деплой (только для main) ===
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && success() && !contains(github.event.head_commit.message, '[skip ci]')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create .env file for deployment
        run: |
          cat > .env << 'EOF'
          # База данных
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          
          # LLM
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          
          # Парсеры
          PARSER_REQUEST_DELAY=${{ vars.PARSER_REQUEST_DELAY }}
          PARSER_MAX_RETRIES=${{ vars.PARSER_MAX_RETRIES }}
          PARSER_TIMEOUT=${{ vars.PARSER_TIMEOUT }}
          
          # Логирование
          LOG_LEVEL=${{ vars.LOG_LEVEL }}
          LOG_DIR=${{ vars.LOG_DIR }}
          
          # Telegram
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID=${{ secrets.ADMIN_CHAT_ID }}
          PROXY_URL=${{ secrets.PROXY_URL }}
          
          # Время
          TIMEZONE=${{ vars.TIMEZONE }}
          EOF
          
          echo "✅ .env file created"
      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Переходим в директорию проекта
            cd /home/newsapp/news_graph || exit 1
            
            # Синхронизируем код (исключая .git)
            rsync -av --delete --exclude='.git' \
              ${{ github.workspace }}/ \
              /home/newsapp/news_graph/
            
            # Останавливаем старые контейнеры
            docker-compose down || true
            
            # Собираем и запускаем новые
            docker-compose up -d --build
            
            # Очищаем старые образы
            docker image prune -f
            
            # Проверяем статус
            docker-compose ps
            
            # Отправляем уведомление в Telegram (опционально)
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id=${{ secrets.ADMIN_CHAT_ID }} \
              -d text="✅ News Graph Project deployed successfully%0ACommit: ${{ github.sha }}%0ABranch: ${{ github.ref_name }}"
      
      - name: Check container status
        if: always()
        run: |
          echo "📊 Deployment status:"
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd /home/newsapp/news_graph && docker-compose ps"

  # === JOB 4: Health check ===
  health-check:
    name: 🏥 Health Check
    runs-on: ubuntu-latest
    needs: [deploy]
    if: success() && needs.deploy.result == 'success'
    
    steps:
      - name: Wait for services
        run: sleep 15
      
      - name: Check containers health
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /home/newsapp/news_graph
            
            # Проверяем парсер
            if docker ps --filter "name=news_graph_parser" --format "{{.Status}}" | grep -q "Up"; then
              echo "✅ Parser is running"
            else
              echo "❌ Parser is not running"
              exit 1
            fi
            
            # Проверяем суммаризатор
            if docker ps --filter "name=news_graph_summarizer" --format "{{.Status}}" | grep -q "Up"; then
              echo "✅ Summarizer is running"
            else
              echo "❌ Summarizer is not running"
              exit 1
            fi
            
            # Проверяем бота
            if docker ps --filter "name=news_graph_bot" --format "{{.Status}}" | grep -q "Up"; then
              echo "✅ Bot is running"
            else
              echo "❌ Bot is not running"
              exit 1
            fi
          EOF
      
      - name: Send health check report
        if: always()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.ADMIN_CHAT_ID }} \
            -d text="🏥 Health Check Report%0A%0AAll containers are running normally" || true