name: Deploy to VPS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # === JOB 1: Тестирование ===
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock
      
      - name: Run tests
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          pytest tests --cov=src
      
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # === JOB 2: Линтинг ===
  lint:
    name: 🔍 Lint Check
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install linters
        run: |
          pip install ruff black isort
      
      - name: Run ruff
        run: ruff check src/ --output-format=github || true
      
      - name: Run black check
        run: black --check src/ || true
      
      - name: Run isort check
        run: isort --check-only --profile black src/ || true

  # === JOB 3: Деплой (self-hosted) ===
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: self-hosted
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && success() && !contains(github.event.head_commit.message, '[skip ci]')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code to project directory
        run: |         
          # Синхронизируем в реальную папку проекта
          rsync -av --delete --exclude='.git' \
            ${{ github.workspace }}/ \
            /home/newsapp/news_graph/

      - name: Create .env file
        run: |
          cd /home/newsapp/news_graph
          
          cat > .env << 'EOF'
          # База данных
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          # LLM
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}

          # Парсеры
          PARSER_REQUEST_DELAY=${{ vars.PARSER_REQUEST_DELAY }}
          PARSER_MAX_RETRIES=${{ vars.PARSER_MAX_RETRIES }}
          PARSER_TIMEOUT=${{ vars.PARSER_TIMEOUT }}

          # Логирование
          LOG_LEVEL=${{ vars.LOG_LEVEL }}
          LOG_DIR=${{ vars.LOG_DIR }}

          # Телеграм
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID=${{ secrets.ADMIN_CHAT_ID }}
          PROXY_URL=${{ secrets.PROXY_URL }}

          # Время
          TIMEZONE=${{ vars.TIMEZONE }}
          EOF
          
          echo "✅ .env file created at /home/newsapp/news_graph"

      - name: Deploy with Docker Compose
        run: |
          cd /home/newsapp/news_graph
          
          # Останавливаем и удаляем все контейнеры, сети и volumes связанные с проектом
          docker-compose down -v --remove-orphans || true
          
          # Собираем и запускаем заново
          docker-compose up -d --build --remove-orphans
          
          # Очищаем старые образы
          docker image prune -f
          
          echo "✅ Deployment completed"

      - name: Check container status
        run: |
          cd /home/newsapp/news_graph
          docker-compose ps