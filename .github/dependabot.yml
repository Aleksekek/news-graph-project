# Dependabot — раз в неделю проверяет новые версии зависимостей и открывает PR'ы.
# Особенно важно для security-фиксов в transitive deps.
#
# Документация: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # Python deps в корневом requirements.txt
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    # Группируем minor/patch апдейты в один PR — меньше шума
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Python deps в services/*/requirements.txt — ОДИН entry на 4 директории
  # с группировкой → общие зависимости (openai и т.п.) будут в одном PR.
  - package-ecosystem: "pip"
    directories:
      - "/services/parser"
      - "/services/ner"
      - "/services/summarizer"
      - "/services/bot"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
      - "services"
    groups:
      services-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions — реже, monthly
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"

  # Docker base images — monthly, ОДИН PR на все 4 сервиса (через `directories`).
  # Игнорируем major-bump'ы Python: 3.11→3.14 ломает совместимость с
  # натишей/asyncpg/wheels — апгрейды major'а делаем вручную.
  - package-ecosystem: "docker"
    directories:
      - "/services/parser"
      - "/services/ner"
      - "/services/summarizer"
      - "/services/bot"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]
    groups:
      docker-base:
        patterns: ["*"]
