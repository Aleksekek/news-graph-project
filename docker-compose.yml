version: '3.8'

services:
  scheduler:
    build: .
    container_name: news_graph_scheduler
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config/schedule_config.yaml:/app/config/schedule_config.yaml
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - LOG_LEVEL=INFO
      - TZ=Europe/Moscow
    env_file:
      - .env
    command: python -m src.domain.scheduling.runner  # Предполагаем of runner.py имеет __main__.py
    restart: unless-stopped  # Постоянный запуск